<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MemoryOS 记忆管理</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>MemoryOS</h1>
          <p id="stats">正在加载...</p>
        </div>
        <div class="actions">
          <button id="refresh">刷新</button>
          <button id="rebuild">重建索引</button>
          <button id="export">导出</button>
        </div>
      </header>

      <section class="toolbar">
        <input id="query" type="search" placeholder="搜索记忆内容" />
        <select id="status">
          <option value="active">active</option>
          <option value="superseded">superseded</option>
          <option value="uncertain">uncertain</option>
          <option value="deleted">deleted</option>
        </select>
        <input id="type" type="text" placeholder="记忆类型，如 preference" />
      </section>

      <section class="editor">
        <input id="new-content" type="text" placeholder="新建记忆内容" />
        <select id="new-scope">
          <option value="global">global</option>
          <option value="user_private">user_private</option>
          <option value="group_shared">group_shared</option>
          <option value="user_in_group">user_in_group</option>
          <option value="session">session</option>
          <option value="persona">persona</option>
        </select>
        <input id="new-owner" type="text" placeholder="owner_key，留空为 global" />
        <button id="create">新建</button>
      </section>

      <section class="content">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>作用域</th>
                <th>类型</th>
                <th>重要性/置信度</th>
                <th>内容</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="memories"></tbody>
          </table>
        </div>
        <aside>
          <h2>后台任务</h2>
          <pre id="jobs">[]</pre>
          <h2>导入</h2>
          <textarea id="import-json" placeholder="粘贴 MemoryOS 导出的 JSON"></textarea>
          <button id="import">导入</button>
          <h2>详情</h2>
          <pre id="details">{}</pre>
        </aside>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
